name: .NET Build

on:
  push:
    branches: [main]
    paths:
      - 'MontagerDotNet/**'
      - '.github/workflows/dotnet.yml'
  pull_request:
    branches: [main]
    paths:
      - 'MontagerDotNet/**'
      - '.github/workflows/dotnet.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      
      - name: Restore dependencies
        run: dotnet restore MontagerDotNet/Montager.sln
      
      - name: Build
        run: dotnet build MontagerDotNet/Montager.sln --no-restore -c Release
      
      - name: Publish CLI
        run: dotnet publish MontagerDotNet/Montager.Cli -c Release -o MontagerDotNet/publish/cli --self-contained false
      
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: montager-cli-linux
          path: MontagerDotNet/publish/cli/
