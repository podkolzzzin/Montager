name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: MontagerPWA/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: MontagerPWA

      - name: Build
        run: npm run build
        working-directory: MontagerPWA

      - name: Upload models to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put montager/models/silero_vad.onnx --file models/silero_vad.onnx --content-type application/octet-stream --remote

      - name: Upload wespeaker model to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put montager/models/wespeaker_en_voxceleb_resnet34.onnx --file models/wespeaker_en_voxceleb_resnet34.onnx --content-type application/octet-stream --remote

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy MontagerPWA/dist --project-name=montager
